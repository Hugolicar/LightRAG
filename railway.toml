# Railway deploy config — Hugolicar/LightRAG (fork)
# Compatible with Railway builder. Uses Dockerfile.railway instead of upstream
# Dockerfile because upstream uses BuildKit --mount=type=cache syntax that
# the Railway builder rejects (validated jun 2026).
# Activates multimodal RAG-Anything-equivalent via MinerU at deploy time.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Railway didn't expand ${PORT} inside TOML strings (caught jun 2026).
# Empty startCommand → Railway uses the CMD defined in Dockerfile.railway
# which listens on 0.0.0.0:9621 (Railway maps EXPOSE 9621 → public :443).
startCommand = ""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume — Hugo confirmado jun 2026: Railway aceita só 1 volume
# por serviço via CLI. Mantemos rag_storage (único que persiste dados RAG
# entre redeploys). input_dir/ e prompt_dir não precisam ser persistentes
# (raw uploads ficam no storage após parse; prompts são parte do codebase).
[[mounts]]
mountPath = "/app/data/rag_storage"
name = "lightrag-storage"
