# Railway deploy config — Hugolicar/LightRAG (fork)
# Compatible with Railway builder. Uses Dockerfile.railway instead of upstream
# Dockerfile because upstream uses BuildKit --mount=type=cache syntax that
# the Railway builder rejects (validated jun 2026).
# Activates multimodal RAG-Anything-equivalent via MinerU at deploy time.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Railway NÃO expande ${PORT} em TOML strings com aspas duplas passadas
# como exec form — só o faz quando rodado via shell. Em vez de mexer no
# CMD do Dockerfile (fix rígida), usamos `sh -c` aqui pra Railway expandir.
# IMPORTANTE: o shell precisa estar presente na imagem (busybox python:3.12-slim NÃO tem sh executável no PATH por padrão)
#
# FIX 2: usar o CMD padrão do Dockerfile (que tem --port 9621 hardcoded) e não passar startCommand.
# Railway expõe a porta automaticamente via $PORT — o Dockerfile final do LightRAG já escuta em 9621,
# então o proxy Railway manda :443 → 9621. startCommand vazio = usa CMD do Dockerfile.
startCommand = ""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volumes — keep RAG storage and inputs across deploys.
# Volumes criados via `railway volume add` (ver /tmp/lightrag-env-prod-guide.md).
[[mounts]]
mountPath = "/app/data/rag_storage"
name = "lightrag-storage"

[[mounts]]
mountPath = "/app/data/inputs"
name = "lightrag-inputs"

[[mounts]]
mountPath = "/app/data/prompts"
name = "lightrag-prompts"
